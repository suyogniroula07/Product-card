<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tuborg Product Card</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">

    <div class="card__image">
      <img src="download.jpeg" alt="Tuborg Beer" />
      <span class="card__badge">Premium Lager</span>
    </div>

    <div class="card__body">

      <div class="card__meta">
        <span class="card__origin">Denmark</span>
        <span class="card__dot"></span>
        <span class="card__year">Est. 1873</span>
      </div>

      <h3 class="card__title"><span>TUBORG</span></h3>

      <p class="card__description">
        A classic Danish lager celebrated for its crisp, smooth taste and
        unmistakable character. Brewed with tradition since 1873.
      </p>

      <div class="card__divider"></div>

      <div class="card__footer">
        <div class="card__price-label">Price</div>
        <div class="card__price">Rs. 325</div>
      </div>

    </div>
  </div>

</body>
</html>
